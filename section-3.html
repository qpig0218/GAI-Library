<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能轉型：面向未來的職能矩陣 - 生成式AI革命在醫院圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #F8F5F2;
            color: #4A4A4A;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 450px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 400px;
            }
        }
        .card {
            background-color: #FFFFFF;
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #EAEAEA;
        }
        .nav-button {
            transition: all 0.2s ease-in-out;
        }
        .nav-button.active {
            color: #D9534F;
            border-bottom: 2px solid #D9534F;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased leading-relaxed">
    <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-10 shadow-sm">
        <div class="container mx-auto px-4">
            <div class="flex justify-center items-center space-x-4 md:space-x-8 py-3 overflow-x-auto">
                <a href="section-1.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">開端</a>
                <a href="section-2.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">角色演進</a>
                <a href="section-3.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2 active">技能轉型</a>
                <a href="section-4.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">風險與守護</a>
                <a href="section-5.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">美台比較</a>
                <a href="section-6.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">價值倒置</a>
                <a href="section-7.html" class="nav-button font-medium text-gray-600 hover:text-red-600 pb-2">策略藍圖</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 max-w-5xl">
        <header class="text-center my-12 md:my-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-gray-800">生成式AI革命在醫院圖書館</h1>
            <p class="text-lg md:text-xl text-gray-500">一份關於轉型、策略與未來的互動報告</p>
        </header>

        <main class="space-y-16 md:space-y-24">
            <section class="card">
                <h2 class="text-3xl font-bold mb-4 text-center">技能轉型：面向未來的職能矩陣</h2>
                <p class="text-gray-600 max-w-3xl mx-auto mb-8 text-center">AI整合要求傳統職能全面升級。下圖比較了AI導入前後，圖書館員在四大核心職能上的概念性精力投入分配變化，突顯了從「檢索」到「評估與治理」的價值轉移。</p>
                <div class="chart-container">
                    <canvas id="skillsChart"></canvas>
                </div>
            </section>
        </main>

        <footer class="text-center mt-16 md:mt-24 py-8 border-t border-gray-200">
            <p class="text-gray-500">此互動報告根據「生成式AI革命在醫院圖書館：轉型、策略與醫學資訊專家的未來」報告生成。所有引用數據請參考原報告。</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wrapLabel = (str, maxWidth = 16) => {
                if (typeof str !== 'string' || str.length <= maxWidth) {
                    return str;
                }
                const words = str.split(' ');
                if (words.length === 1) return str;
                const lines = [];
                let currentLine = words[0];
                for (let i = 1; i < words.length; i++) {
                    if ((currentLine + " " + words[i]).length > maxWidth) {
                        lines.push(currentLine);
                        currentLine = words[i];
                    } else {
                        currentLine += " " + words[i];
                    }
                }
                lines.push(currentLine);
                return lines;
            };
            
            const tooltipConfig = {
                plugins: {
                    tooltip: {
                        callbacks: {
                            title: function(tooltipItems) {
                                const item = tooltipItems[0];
                                if (!item) return '';
                                let label = item.chart.data.labels[item.dataIndex];
                                if (Array.isArray(label)) {
                                  return label.join(' ');
                                }
                                return label;
                            }
                        }
                    }
                }
            };

            const skillsChartCtx = document.getElementById('skillsChart')?.getContext('2d');
            if(skillsChartCtx) {
                const skillsLabels = [
                    '資訊檢索', 
                    '館藏發展', 
                    '使用者教學', 
                    'AI評估與治理'
                ];
                new Chart(skillsChartCtx, {
                    type: 'bar',
                    data: {
                        labels: skillsLabels.map(label => wrapLabel(label, 16)),
                        datasets: [
                            {
                                label: '傳統精力投入',
                                data: [45, 25, 25, 5],
                                backgroundColor: '#B0B0B0',
                            },
                            {
                                label: 'AI整合後精力投入',
                                data: [15, 20, 30, 35],
                                backgroundColor: '#5CB85C',
                            }
                        ]
                    },
                    options: {
                        maintainAspectRatio: false,
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: '概念性精力投入 (%)' } },
                            x: { ticks: { maxRotation: 0, minRotation: 0 } }
                        },
                        plugins: tooltipConfig.plugins
                    }
                });
            }
        });
    </script>
</body>
</html>
