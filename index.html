    <!-- Visualization & Content Choices: 1. 53% Statistic -> Goal: Inform -> Method: Single Big Number -> Justification: High-impact, immediate hook. 2. Role Shift -> Goal: Organize/Change -> Method: HTML/CSS Diagram -> Justification: Clearly shows a "before/after" conceptual flow without chart complexity. 3. Skill Shift -> Goal: Compare -> Method: Chart.js Grouped Bar Chart -> Justification: Visually quantifies the shift in effort across core functions. 4. AI Risks -> Goal: Inform/Organize -> Method: HTML/CSS Icon Cards -> Justification: Breaks down complex risks into easily digestible, memorable points. 5. US vs. Taiwan -> Goal: Compare -> Method: Chart.js Radar Chart & HTML Table -> Justification: Radar chart provides a powerful multi-axial visual comparison, while the table offers detailed data points. 6. Value Inversion -> Goal: Inform -> Method: HTML/CSS Typographic Visual -> Justification: A simple, powerful visual metaphor for the report's core thesis. All visualizations use Chart.js (Canvas) or HTML/CSS, adhering to the NO SVG/Mermaid constraint. -->
